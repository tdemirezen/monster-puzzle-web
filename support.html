<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Puzzle - Support</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #1a0533 0%, #2d1b69 50%, #1a0533 100%);
            min-height: 100vh;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 32px 24px;
            margin-top: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 {
            color: #6a1b9a;
            font-size: 24px;
            text-align: center;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            text-align: center;
            font-size: 14px;
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
            font-size: 14px;
        }
        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            margin-bottom: 16px;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #7b1fa2;
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7b1fa2, #9c27b0);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button[type="submit"]:hover {
            opacity: 0.9;
        }
        button[type="submit"]:active {
            transform: scale(0.98);
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }
        .footer a {
            color: rgba(255, 255, 255, 0.7);
        }
        .success-msg {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
        .success-msg h2 {
            color: #4caf50;
            margin-bottom: 12px;
        }
        .success-msg p {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Monster Puzzle Support</h1>
        <p class="subtitle">We'd love to hear from you! Fill out the form below and we'll get back to you as soon as possible.</p>

        <form action="https://formsubmit.co/talha.demirezen@hotmail.com" method="POST" id="supportForm">
            <!-- FormSubmit configuration -->
            <input type="hidden" name="_subject" value="Monster Puzzle Support Request">
            <input type="hidden" name="_captcha" value="true">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_next" value="https://tdemirezen.github.io/monster-puzzle-privacy/support-thanks.html">
            <!-- Honeypot anti-spam -->
            <input type="text" name="_honey" style="display:none">

            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required>

            <label for="topic">Topic</label>
            <select id="topic" name="topic" required>
                <option value="" disabled selected>Select a topic</option>
                <option value="Bug Report">Bug Report</option>
                <option value="Feature Request">Feature Request</option>
                <option value="Account Issue">Account / Progress Issue</option>
                <option value="Ads Issue">Ads Issue</option>
                <option value="General Question">General Question</option>
                <option value="Other">Other</option>
            </select>

            <label for="device">Device Info (optional)</label>
            <input type="text" id="device" name="device" placeholder="e.g. iPhone 15, iPad Air, Samsung Galaxy S24">

            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Please describe your issue or feedback in detail..." required></textarea>

            <button type="submit">Send Message</button>
        </form>
    </div>

    <div class="footer">
        <p>SycamoreGames | <a href="privacy-policy.html">Privacy Policy</a></p>
    </div>
</body>
</html>
