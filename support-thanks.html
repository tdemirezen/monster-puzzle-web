<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Puzzle - Message Sent</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #1a0533 0%, #2d1b69 50%, #1a0533 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 40px 24px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .checkmark {
            font-size: 64px;
            margin-bottom: 16px;
        }
        h1 {
            color: #4caf50;
            font-size: 22px;
            margin-bottom: 12px;
        }
        p {
            color: #666;
            margin-bottom: 24px;
        }
        a.back {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, #7b1fa2, #9c27b0);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="checkmark">&#10004;</div>
        <h1>Message Sent!</h1>
        <p>Thank you for contacting us. We'll review your message and get back to you as soon as possible.</p>
        <a class="back" href="support.html">Back to Support</a>
    </div>
</body>
</html>
